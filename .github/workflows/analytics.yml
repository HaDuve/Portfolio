name: Analytics

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: analytics

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: analytics/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
